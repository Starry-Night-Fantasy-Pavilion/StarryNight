<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>{title} - {siteName}</title>
    <!--[if mso]>
    <style type="text/css">
        body, table, td {font-family: Arial, sans-serif !important;}
    </style>
    <![endif]-->
</head>
<body style="margin: 0; padding: 20px 0; background-color: #f4f4f4; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;">
    <table role="presentation" cellspacing="0" cellpadding="0" border="0" width="100%" style="max-width: 600px; margin: 0 auto; background-color: #ffffff; border-radius: 10px; box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);">
        <tr>
            <td style="padding: 40px 30px;">
                <table role="presentation" cellspacing="0" cellpadding="0" border="0" width="100%">
                    <tr>
                        <td style="text-align: center; padding-bottom: 30px; border-bottom: 2px solid #667eea;">
                            <h1 style="margin: 0; color: #667eea; font-size: 26px; font-weight: 600;">{siteName}</h1>
                        </td>
                    </tr>
                </table>

                <table role="presentation" cellspacing="0" cellpadding="0" border="0" width="100%">
                    <tr>
                        <td style="padding: 12px 0 8px 0;">
                            <p style="margin: 0; font-size: 13px; line-height: 1.5; color: #64748b;">
                                活动主题：<strong style="color:#334155;">{title}</strong>
                            </p>
                        </td>
                    </tr>
                </table>

                <table role="presentation" cellspacing="0" cellpadding="0" border="0" width="100%">
                    <tr>
                        <td style="padding: 20px 0 12px 0;">
                            <p style="margin: 0 0 16px 0; font-size: 16px; line-height: 1.6; color: #333333;">
                                您好：
                            </p>
                            <p style="margin: 0 0 20px 0; font-size: 15px; line-height: 1.75; color: #333333; white-space: pre-wrap;">
                                {summary}
                            </p>
                        </td>
                    </tr>
                </table>

                <table role="presentation" cellspacing="0" cellpadding="0" border="0" width="100%">
                    <tr>
                        <td align="center" style="padding: 10px 0 8px 0;">
                            <a href="{link}" target="_blank" rel="noopener" style="display: inline-block; padding: 12px 28px; border-radius: 8px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: #ffffff; font-size: 16px; text-decoration: none; font-weight: 600;">查看详情</a>
                        </td>
                    </tr>
                    <tr>
                        <td style="padding: 0 0 20px 0;">
                            <p style="margin: 0; font-size: 13px; line-height: 1.6; color: #666666; text-align: center;">
                                若按钮无法点击，请复制链接到浏览器：<br>
                                <span style="word-break: break-all; color: #999999;">{link}</span>
                            </p>
                        </td>
                    </tr>
                </table>

                <table role="presentation" cellspacing="0" cellpadding="0" border="0" width="100%">
                    <tr>
                        <td style="padding: 20px 0; background-color: #f8f9fa; border-radius: 6px; padding-left: 18px; padding-right: 18px;">
                            <p style="margin: 0 0 10px 0; font-size: 14px; line-height: 1.6; color: #333333; font-weight: 600;">
                                提示
                            </p>
                            <ul style="margin: 0; padding-left: 20px; font-size: 13px; line-height: 1.8; color: #666666;">
                                <li>活动规则与截止时间以站内说明为准；</li>
                                <li>请勿将活动链接转发给非本人邮箱，以免泄露参与资格；</li>
                                <li>如有疑问，请通过站内客服或官方渠道联系。</li>
                            </ul>
                        </td>
                    </tr>
                </table>

                <table role="presentation" cellspacing="0" cellpadding="0" border="0" width="100%">
                    <tr>
                        <td style="padding-top: 26px; border-top: 1px solid #eeeeee; text-align: center;">
                            <p style="margin: 0 0 8px 0; font-size: 12px; line-height: 1.5; color: #999999;">
                                本邮件由系统自动发送，请勿直接回复。
                            </p>
                            <p style="margin: 0; font-size: 12px; line-height: 1.5; color: #999999;">
                                © {currentYear} {siteName} · All rights reserved.
                            </p>
                        </td>
                    </tr>
                </table>
            </td>
        </tr>
    </table>
</body>
</html>
